name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install black flake8 isort
      - name: Black
        run: black --check src frontend tests
      - name: Flake8
        run: flake8 src frontend tests
      - name: isort
        run: isort --check-only src frontend tests

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        # Unit tests mock all external IO, so no database or model is needed.
        # Integration tests live under tests/integration and run against a live
        # stack, so they are excluded here.
        run: pytest tests/unit -q

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Dependency scan
        run: pip-audit -r requirements.txt
