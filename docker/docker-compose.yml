# rag-multimodal-2026 stack.
# Data services (postgres, redis) run standalone for local development and tests.
# App services (api, worker, streamlit) build from the project Dockerfile.
#
# For building and testing, bring up only the data services:
#   docker compose -f docker/docker-compose.yml up -d postgres redis
# For the full stack later:
#   docker compose -f docker/docker-compose.yml up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_multimodal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_multimodal
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - rag_multimodal-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_multimodal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rag_multimodal-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rag_multimodal:latest
    container_name: rag_multimodal-api
    restart: unless-stopped
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag_multimodal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rag_multimodal:latest
    container_name: rag_multimodal-worker
    restart: unless-stopped
    command: celery -A src.worker.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag_multimodal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rag_multimodal:latest
    container_name: rag_multimodal-streamlit
    restart: unless-stopped
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - path: ../.env
        required: false
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  rag_multimodal-pgdata:
